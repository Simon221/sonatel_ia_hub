services:
  postgres:
    image: postgres:16-alpine
    container_name: sonatel_ia_hub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-sonatel_ia_hub}
      POSTGRES_USER:     ${POSTGRES_USER:-sonatel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonatel} -d ${POSTGRES_DB:-sonatel_ia_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
